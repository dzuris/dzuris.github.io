<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oprava a servis mobilov | mobilflex</title>
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto:ital,wght@0,300;0,400;0,500;1,300;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detail.css">
    <script src="script/search.js"></script>
    <script src="script/detail-init.js"></script>
    <script src="script/components_scripts/header.js"></script>
    <script src="script/components_scripts/footer.js"></script>
</head>
<body>
    <header id="header">
        <div id="header-menu"></div>
    </header>
    <main>
        <div class="header-title-with-model">
            <h2 id="service-name"></h2>
            <h2 id="model-name"></h2>
        </div>
        <div class="detail-body">
            <img id="detail-img" src="" alt="Service detail image">
            <h2 id="detail-price"></h2>
            <div id="detail-price-no-tax">
                <span id="detail-price-no-tax-num"></span>
                <span>bez DPH</span>
            </div>
            <p id="detail-servis-info">🛠️ Cena zahŕňa náhradný diel a prácu servisného technika.</p>
            <p id="detail-waiting"></p>
            <p id="detail-note"></p>
        </div>
        <div class="detailed-description">
            <h3>Podrobný popis</h3>
            <p id="detailed-description-text"></p>
        </div>
    </main>
    <footer id="footer"></footer>
</body>
</html>
